version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx prisma generate
        - npx prisma migrate deploy
        - npx prisma db seed
        - env | grep -E '^(AUTH_SECRET|NEXTAUTH_SECRET|NEXTAUTH_URL|DATABASE_URL)=' >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*